<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RMetS presenter voting dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="dashboard">
    <header>
      <p class="eyebrow">Presenter dashboard</p>
      <h1>RMetS live voting</h1>
      <p class="muted">Set the active phone poll, then open the full-screen browser result when the room has voted.</p>
    </header>
    <section class="grid">
      <aside id="poll-list" class="panel"></aside>
      <section id="results" class="panel"></section>
    </section>
  </main>
  <script src="/presenter.js"></script>
</body>
</html>
